<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddities | The Odd Phoenix</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; background: #12121a; color: #f5f0e8; scroll-behavior: smooth; }
    .app-wrapper { font-family: 'Outfit', sans-serif; }
    .oddity-line { width: 32px; height: 2px; background: linear-gradient(to right, #8a2be2 0%, transparent 100%); }
    .attraction-card { transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1); border: 1px solid rgba(138,43,226,0.08); background: #1e1e28; }
    .attraction-card:hover { transform: translateY(-8px); border-color: rgba(138,43,226,0.4); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
    .skull-spin { animation: skullBounce 3s ease-in-out infinite; }
    @keyframes skullBounce { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(5deg); } }
    .scroll-container::-webkit-scrollbar { display: none; }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .liked { color: #8a2be2 !important; fill: #8a2be2 !important; }
  </style>
</head>
<body class="h-full">
  <div id="app" class="app-wrapper h-full w-full overflow-auto">
    
    <nav class="sticky top-0 z-50 backdrop-blur-xl border-b border-purple-900/20 bg-[#12121a]/90">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="skull-spin"><i data-lucide="skull" class="text-purple-600 w-7 h-7"></i></div>
          <span class="text-2xl font-black tracking-tighter">ODDITIES</span>
        </div>
        <div class="relative group">
          <button class="flex items-center gap-2 px-5 py-2.5 rounded-full text-xs font-bold bg-[#8a2be2] text-[#12121a] uppercase tracking-wider transition hover:scale-105">
            <i data-lucide="user" class="w-4 h-4"></i> 
            <span>My Account</span>
            <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </button>
          <div class="absolute right-0 mt-2 w-56 bg-[#1e1e28] border border-white/10 rounded-2xl shadow-2xl overflow-hidden hidden group-hover:block">
            <button onclick="document.getElementById('grid-section').scrollIntoView()" class="w-full px-5 py-4 text-left text-sm hover:bg-white/5 flex items-center justify-between">
              <span>My Bucket List</span>
              <span id="saved-count" class="bg-purple-600 text-black px-2 py-0.5 rounded-full text-[10px] font-bold">0</span>
            </button>
            <button class="w-full px-5 py-4 text-left text-sm hover:bg-white/5 border-t border-white/5">Settings</button>
          </div>
        </div>
      </div>
    </nav>

    <header class="relative py-24 px-6 overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-b from-[#1a0a2a] via-[#12121a] to-[#12121a] opacity-80"></div>
      <div class="relative z-10 max-w-6xl mx-auto text-left fade-in">
        <h1 class="text-5xl sm:text-7xl font-black mb-6 tracking-tight leading-[0.9]">Explore the Strange,<br>the Mysterious,<br>the Unforgettable</h1>
        <p class="text-xl text-zinc-400 mb-10 font-light leading-relaxed max-w-2xl">Discover haunted asylums, cryptid hotspots, and mysteries that defy explanation. Real places, real histories, real hauntings.</p>
        
        <div class="flex flex-wrap gap-4">
          <button onclick="document.getElementById('grid-section').scrollIntoView({behavior: 'smooth'})" class="bg-purple-600 text-[#12121a] px-8 py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:scale-105 transition shadow-lg shadow-purple-900/20">
            Explore Locations
          </button>
          <button onclick="alert('Coming soon: Create an account to save your favorite oddities!')" class="bg-white/5 border border-white/20 text-white px-8 py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-white/10 transition flex items-center gap-2">
            <i data-lucide="bookmark" class="w-4 h-4"></i>
            Start a Bucket List
          </button>
        </div>
      </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 mb-20 fade-in">
      <div class="flex items-center gap-3 mb-8">
        <div class="oddity-line"></div>
        <div class="flex flex-col">
          <span class="text-purple-500 text-[10px] font-black uppercase tracking-[0.3em] mb-0.5">THIS WEEK</span>
          <h2 class="text-2xl font-black">Oddity of the Week</h2>
        </div>
      </div>
      <div id="featured-card" class="bg-[#1e1e28] rounded-[2.5rem] border border-purple-900/30 flex flex-col md:flex-row cursor-pointer transition-all hover:bg-[#252533] overflow-hidden">
        </div>
    </section>

    <section id="grid-section" class="max-w-6xl mx-auto px-6 pb-40">
      <div class="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-8 mb-12">
        <div class="flex items-center gap-3">
          <div class="oddity-line"></div>
          <div class="flex flex-col">
            <span class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.3em] mb-0.5">EXPLORE</span>
            <h2 class="text-4xl font-black leading-none">Discover Oddities</h2>
          </div>
        </div>
        
        <div class="relative w-full lg:w-96">
          <i data-lucide="search" class="absolute left-5 top-4 w-5 h-5 text-zinc-500"></i>
          <input id="search-input" type="text" placeholder="Search places, tags" class="w-full bg-white/5 border border-white/10 rounded-full py-4 pl-14 pr-6 focus:outline-none focus:border-purple-500 text-white">
        </div>
      </div>
      
      <div class="flex gap-2 overflow-x-auto scroll-container pb-8">
        <button class="filter-btn active bg-purple-600 text-white px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="all"><i data-lucide="sparkles" class="w-4 h-4"></i> All Oddities</button>
        <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="cemetery"><i data-lucide="cross" class="w-4 h-4"></i> Cemeteries</button>
        <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="historic"><i data-lucide="landmark" class="w-4 h-4"></i> Historic</button>
        <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="haunted"><i data-lucide="ghost" class="w-4 h-4"></i> Haunted</button>
        <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="cryptid"><i data-lucide="footprints" class="w-4 h-4"></i> Cryptid</button>
        <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="alien"><i data-lucide="ufo" class="w-4 h-4"></i> Aliens/UFO</button>
      </div>

      <div id="trip-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
    </section>

    <div id="detail-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
      <div class="w-full max-w-3xl bg-[#1e1e28] rounded-[2.5rem] overflow-hidden border border-white/10 max-h-[90vh] overflow-y-auto shadow-2xl relative">
        <div class="p-8 border-b border-white/5 flex justify-between items-center bg-[#1e1e28] sticky top-0 z-10">
          <h2 id="modal-title" class="text-3xl font-black">Location</h2>
          <button id="modal-close" class="p-3 bg-white/5 rounded-full hover:bg-red-500/20 text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="modal-content" class="p-10"></div>
        <div class="sticky bottom-0 bg-[#1e1e28] p-8 border-t border-white/5 flex gap-4 z-10">
          <button id="modal-save-btn" class="p-4 bg-white/5 rounded-2xl hover:bg-white/10 text-white transition">
            <i data-lucide="bookmark" id="modal-save-icon" class="w-6 h-6"></i>
          </button>
          <a id="modal-map-link" href="#" target="_blank" class="flex-1 bg-purple-600 text-black py-4 rounded-2xl font-bold text-center flex items-center justify-center gap-3">
            <i data-lucide="navigation" class="w-5 h-5 fill-current"></i> Visit
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const trips = [
      { id: 'eureka', title: 'Eureka Springs, Arkansas', region: 'Carroll County, AR', type: 'Historic Town', category: 'historic', tags: ['Historic Town', 'Paranormal Hub'], color: '#2a0a20', desc: 'Built into the Ozark Mountains during the 1880s silver boom. Locals and visitors report that the town itself harbors paranormal activity.', history: 'Eureka Springs emerged during the 1880s silver boom. The rapid growth and subsequent economic bust left emotional scars.', funFacts: ['Built on steep Ozark hillsides', 'Victorian architecture preserved', 'Ghost tours operate nightly'], image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&fit=crop' },
      { id: 'waverly', title: 'Waverly Hills Sanatorium', region: 'Louisville, KY', type: 'Haunted Hospital', category: 'haunted', tags: ['Medical History', 'Body Chute'], color: '#2a0a40', desc: 'One of America\'s most haunted places. The "body chute" was used to remove thousands of corpses.', history: 'Opened in 1910. Over 60,000 deaths. Room 502 is noted for extreme poltergeist activity.', funFacts: ['Body chute for discreet removals', 'Over 60k documented deaths', 'Shadow people sightings'], image: 'https://images.unsplash.com/photo-1518392846015-55a9cc003b25?w=800&fit=crop' },
      { id: 'san-luis', title: 'San Luis Valley, Colorado', region: 'South-Central CO', type: 'UFO Hotspot', category: 'alien', tags: ['Ley Lines', 'UFOs'], color: '#0a2a1a', desc: 'A remote valley famous as a global UFO hotspot and cryptid center.', history: 'Indigenous peoples reported "sky beings" for centuries.', funFacts: ['Hundreds of UFO sightings annually', 'Intersection of ley lines'], image: 'https://images.unsplash.com/photo-1444080748397-f442aa95c3e5?w=800&fit=crop' },
      { id: 'stanley', title: 'The Stanley Hotel', region: 'Estes Park, CO', type: 'Haunted Hotel', category: 'haunted', tags: ['The Shining'], color: '#1a2a0a', desc: 'Inspired Stephen King\'s "The Shining". Guests report phantom piano music.', history: 'Built in 1909. King conceived his plot while staying in Room 217.', funFacts: ['Room 217 is the most active', 'Piano music in the Gold Room'], image: 'https://images.unsplash.com/photo-1551632706-5386c5193122?w=800&fit=crop' },
      { id: 'ohio', title: 'Ohio State Reformatory', region: 'Mansfield, OH', type: 'Historic Prison', category: 'historic', tags: ['Shawshank', 'Gothic'], color: '#1a2a0a', desc: 'A massive Victorian Gothic prison that housed the most violent offenders in Ohio.', history: 'Witnessed executions, severe violence, and suicides. Famous as a filming location.', funFacts: ['Filming location for Shawshank Redemption', 'Shadow figures reported'], image: 'https://images.unsplash.com/photo-1464207687429-7505649dae38?w=800&fit=crop' }
      // ... more data here
    ];

    let likedTrips = new Set();
    let currentFilter = 'all';

    function toggleSave(id) {
      if (likedTrips.has(id)) likedTrips.delete(id);
      else likedTrips.add(id);
      document.getElementById('saved-count').textContent = likedTrips.size;
      renderGrid();
      renderFeatured();
      updateModalSaveBtn(id);
    }

    function updateModalSaveBtn(id) {
      const icon = document.getElementById('modal-save-icon');
      if (!icon) return;
      if (likedTrips.has(id)) icon.classList.add('liked');
      else icon.classList.remove('liked');
    }

    function renderFeatured() {
      const featured = trips[Math.floor(new Date() / 86400000) % trips.length];
      const isLiked = likedTrips.has(featured.id);
      document.getElementById('featured-card').innerHTML = `
        <div class="w-full md:w-2/5 min-h-[300px]"><img src="${featured.image}" class="h-full w-full object-cover"></div>
        <div class="p-10 flex flex-col justify-center flex-1">
          <span class="text-purple-500 text-[10px] font-black uppercase mb-2">${featured.region}</span>
          <h3 class="text-3xl font-black mb-4 text-[#f5f0e8]">${featured.title}</h3>
          <p class="text-zinc-400 mb-8 line-clamp-2">${featured.desc}</p>
          <div class="flex gap-4">
            <button onclick="event.stopPropagation(); toggleSave('${featured.id}')" class="p-4 bg-white/5 rounded-2xl hover:bg-white/10 ${isLiked ? 'liked' : ''} transition-all">
              <i data-lucide="bookmark" class="w-5 h-5"></i>
            </button>
            <button onclick="openModalById('${featured.id}')" class="px-8 bg-white/5 rounded-2xl text-xs font-bold uppercase tracking-widest border border-white/10 text-white">Details</button>
          </div>
        </div>
      `;
      lucide.createIcons();
    }

    function renderGrid() {
      const grid = document.getElementById('trip-grid');
      grid.innerHTML = '';
      const filtered = currentFilter === 'all' ? trips : trips.filter(t => t.category === currentFilter);
      filtered.forEach(item => {
        const isLiked = likedTrips.has(item.id);
        const card = document.createElement('div');
        card.className = 'attraction-card rounded-[2.5rem] p-8 cursor-pointer relative fade-in';
        card.innerHTML = `
          <div class="h-40 rounded-2xl mb-6 overflow-hidden"><img src="${item.image}" class="h-full w-full object-cover"></div>
          <div class="flex justify-between items-start mb-4">
            <div>
              <span class="text-purple-500 text-[9px] font-black uppercase tracking-widest">${item.category}</span>
              <h3 class="text-lg font-bold mt-1 text-white">${item.title}</h3>
            </div>
            <button onclick="event.stopPropagation(); toggleSave('${item.id}')" class="p-2 bg-white/5 rounded-full ${isLiked ? 'liked' : ''} transition-all">
              <i data-lucide="bookmark" class="w-4 h-4"></i>
            </button>
          </div>
          <p class="text-zinc-500 text-xs line-clamp-2">${item.desc}</p>
        `;
        card.onclick = () => openModal(item);
        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    function openModal(item) {
      document.getElementById('modal-title').textContent = item.title;
      updateModalSaveBtn(item.id);
      document.getElementById('modal-save-btn').onclick = () => toggleSave(item.id);
      document.getElementById('modal-map-link').href = `http://googleusercontent.com/maps.google.com/4{encodeURIComponent(item.title)}`;
      document.getElementById('modal-content').innerHTML = `
        <img src="${item.image}" class="w-full h-64 object-cover rounded-3xl mb-10">
        <p class="text-zinc-300 text-lg leading-relaxed mb-8">${item.desc}</p>
        <div class="bg-black/30 p-8 rounded-[2rem] border border-white/5 mb-8">
          <h4 class="text-purple-500 font-bold uppercase text-xs mb-4 tracking-widest">History</h4>
          <p class="text-zinc-400 text-sm leading-relaxed">${item.history}</p>
        </div>
        <div>
          <h4 class="text-purple-500 font-bold uppercase text-xs mb-4 tracking-widest">Key Facts</h4>
          <ul class="space-y-3 text-sm text-zinc-400">
            ${item.funFacts.map(f => `<li class="flex gap-3"><i data-lucide="star" class="w-4 h-4 text-purple-600"></i>${f}</li>`).join('')}
          </ul>
        </div>
      `;
      document.getElementById('detail-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    function openModalById(id) { openModal(trips.find(t => t.id === id)); }

    window.onload = () => {
      renderFeatured();
      renderGrid();
      lucide.createIcons();
      document.getElementById('modal-close').onclick = () => document.getElementById('detail-modal').classList.add('hidden');
      
      document.getElementById('search-input').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = trips.filter(t => t.title.toLowerCase().includes(val) || t.desc.toLowerCase().includes(val));
        const grid = document.getElementById('trip-grid');
        grid.innerHTML = '';
        filtered.forEach(item => {
           const card = document.createElement('div');
           card.className = 'attraction-card rounded-[2.5rem] p-8 cursor-pointer relative';
           card.innerHTML = `<h3 class="text-lg font-bold text-white">${item.title}</h3>`;
           card.onclick = () => openModal(item);
           grid.appendChild(card);
        });
      };

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('bg-purple-600', 'text-white');
            b.classList.add('bg-white/5', 'text-zinc-500');
          });
          btn.classList.add('bg-purple-600', 'text-white');
          currentFilter = btn.dataset.filter;
          renderGrid();
        };
      });
    };
  </script>
</body>
</html>
