<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Oddities | The Odd Phoenix</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="data.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    html, body { height: 100%; margin: 0; background: #12121a; color: #f5f0e8; scroll-behavior: smooth; }
    .app-wrapper { font-family: 'Outfit', sans-serif; }
    .attraction-card { transition: all 0.4s ease; border: 1px solid rgba(138,43,226,0.08); background: #1e1e28; }
    .attraction-card:hover { transform: translateY(-8px); border-color: rgba(138,43,226,0.4); }
    
    /* Stop iOS Zoom */
    input { font-size: 16px !important; }

    /* Spaced Heading */
    .odd-heading { letter-spacing: 0.15em; text-transform: uppercase; }

    #toast { visibility: hidden; background-color: #8a2be2; color: #fff; text-align: center; border-radius: 16px; padding: 20px; position: fixed; z-index: 1000; right: 30px; bottom: 30px; }
    #toast.show { visibility: visible; animation: fadein 0.5s; }
    @keyframes fadein { from {opacity: 0;} to {opacity: 1;} }
  </style>
</head>
<body class="h-full">
  <div id="toast">Coming Soon</div>

  <div id="app" class="app-wrapper h-full w-full overflow-auto relative">
    <nav class="border-b border-purple-900/20 bg-[#12121a] sticky top-0 z-[150]">
      <div class="max-w-6xl mx-auto px-4 py-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i data-lucide="skull" class="text-purple-600 w-8 h-8"></i>
          <span class="text-2xl font-black uppercase text-white">Oddities</span>
        </div>
      </div>
    </nav>

    <header class="relative pt-24 pb-12 px-6">
      <h1 class="text-5xl sm:text-7xl font-black mb-6 uppercase text-[#f5f0e8]">Explore the Strange</h1>
      <button onclick="document.getElementById('grid-section').scrollIntoView({behavior: 'smooth'})" class="bg-purple-600 text-[#12121a] px-8 py-4 rounded-xl font-bold uppercase text-xs">Explore Locations</button>
    </header>

    <section id="grid-section" class="max-w-6xl mx-auto px-4 pb-12">
      <div class="bg-white/5 border border-white/10 p-6 rounded-[1.5rem] mb-10">
        <input id="search-input" type="text" placeholder="Search name, state (TX), or full state (Texas)..." class="w-full bg-[#12121a] border border-white/10 rounded-full py-3.5 px-6 text-white outline-none focus:border-purple-500">
      </div>
      <div id="trip-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <section class="max-w-6xl mx-auto px-4 pb-20">
      <div class="p-12 bg-purple-900/10 border border-purple-500/20 rounded-[2.5rem] text-center">
        <h3 class="odd-heading text-2xl font-black text-white mb-4">Know an odd location?</h3>
        <button onclick="showToast('Coming Soon')" class="bg-purple-600 text-[#12121a] px-6 py-3 rounded-xl font-bold uppercase text-xs">Suggest a Stop</button>
      </div>
    </section>

    <div id="detail-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
      <div class="w-full max-w-2xl bg-[#1e1e28] rounded-[1.5rem] overflow-hidden border border-white/10 h-auto max-h-[90vh] flex flex-col relative text-left">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
          <h2 id="modal-title" class="text-2xl font-black uppercase">Location</h2>
          <button onclick="closeModal()" class="p-2 bg-white/5 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div id="modal-content" class="p-8 space-y-6 overflow-y-auto"></div>
        <div class="p-6 border-t border-white/5 flex gap-4">
          <a id="modal-map-link" href="#" target="_blank" class="flex-1 bg-purple-600 text-black py-4 rounded-xl font-bold text-center uppercase text-xs tracking-widest">Visit Location</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const stateMap = {'texas':'TX','michigan':'MI','pennsylvania':'PA','florida':'FL','california':'CA'}; // Add more as needed

    function showToast(msg) {
      const t = document.getElementById("toast"); t.textContent = msg;
      t.className = "show"; setTimeout(() => t.className = "", 3000);
    }

    // Modal & Back Button
    function openModal(id) {
      const item = trips.find(t => t.id === id);
      if(!item) return;

      history.pushState({modalOpen: true}, '');
      
      // Dynamic Map Detection
      const query = encodeURIComponent(`${item.title} ${item.region}`);
      const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
      document.getElementById('modal-map-link').href = isApple ? `maps://maps.apple.com/?q=${query}` : `https://www.google.com/maps/search/?api=1&query=${query}`;

      document.getElementById('modal-title').textContent = item.title;
      document.getElementById('modal-content').innerHTML = `
        <div class="rounded-xl overflow-hidden mb-6"><img src="images/${item.id}.png" class="w-full h-auto"></div>
        
        ${item.safety_rating ? `
        <div class="bg-red-500/10 border border-red-500/30 p-4 rounded-xl mb-4">
            <h4 class="text-red-500 font-bold uppercase text-xs">Safety Risk: ${item.safety_rating}</h4>
            <p class="text-zinc-400 text-sm">${item.safety_reason || 'Caution advised.'}</p>
        </div>` : ''}

        <p class="text-zinc-300 text-lg leading-relaxed">${item.desc}</p>
        
        <div class="mt-8">
            <h4 class="text-purple-500 font-bold uppercase text-xs mb-4">Related Oddities</h4>
            <div class="space-y-2">
              ${trips.filter(t => t.category === item.category && t.id !== item.id).slice(0, 2).map(rel => `
                <button onclick="openModal('${rel.id}')" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-left hover:bg-white/10 transition text-white font-bold uppercase text-xs">
                    ${rel.title}
                </button>`).join('')}
            </div>
        </div>
      `;
      document.getElementById('detail-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    window.onpopstate = () => document.getElementById('detail-modal').classList.add('hidden');
    function closeModal() {
      document.getElementById('detail-modal').classList.add('hidden');
      if(history.state && history.state.modalOpen) history.back();
    }

    // Search Logic
    document.getElementById('search-input').oninput = (e) => {
      const val = e.target.value.toLowerCase().trim();
      const filtered = trips.filter(t => {
        const stateMatch = t.state && (t.state.toLowerCase() === val || stateMap[val] === t.state);
        return t.title.toLowerCase().includes(val) || t.region.toLowerCase().includes(val) || stateMatch;
      });
      renderGrid(filtered);
    };

    function renderGrid(data = trips) {
      document.getElementById('trip-grid').innerHTML = data.map(item => `
        <div onclick="openModal('${item.id}')" class="attraction-card rounded-2xl p-6 cursor-pointer">
          <div class="h-40 rounded-xl mb-4 overflow-hidden"><img src="images/${item.id}.png" class="w-full h-full object-cover"></div>
          <h3 class="text-white font-bold uppercase text-sm">${item.title}</h3>
          <p class="text-purple-500 text-[10px] font-bold uppercase mt-2">${item.region}</p>
        </div>`).join('');
      lucide.createIcons();
    }

    window.onload = () => { renderGrid(); lucide.createIcons(); };
  </script>
</body>
</html>
