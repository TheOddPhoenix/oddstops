<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddities | The Odd Phoenix</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; background: #12121a; color: #f5f0e8; scroll-behavior: smooth; }
    .app-wrapper { font-family: 'Outfit', sans-serif; }
    .attraction-card { transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1); border: 1px solid rgba(138,43,226,0.08); background: #1e1e28; }
    .attraction-card:hover { transform: translateY(-8px); border-color: rgba(138,43,226,0.4); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
    .skull-spin { animation: skullBounce 3s ease-in-out infinite; }
    @keyframes skullBounce { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(5deg); } }
    .scroll-container::-webkit-scrollbar { display: none; }
    .liked { color: #8a2be2 !important; fill: #8a2be2 !important; }
  </style>
</head>
<body class="h-full">
  <div id="app" class="app-wrapper h-full w-full overflow-auto">
    
    <nav class="border-b border-purple-900/20 bg-[#12121a]">
      <div class="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between">
        <div class="flex items-center gap-3 text-left">
          <div class="skull-spin"><i data-lucide="skull" class="text-purple-600 w-8 h-8"></i></div>
          <span class="text-2xl font-black tracking-tighter">ODDITIES</span>
        </div>
        <div class="relative group">
          <button class="flex items-center gap-2 px-5 py-2.5 rounded-full text-xs font-bold bg-[#8a2be2] text-[#12121a] uppercase tracking-wider transition hover:scale-105">
            <i data-lucide="user" class="w-4 h-4"></i> 
            <span>My Account</span>
            <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </button>
          <div class="absolute right-0 mt-2 w-56 bg-[#1e1e28] border border-white/10 rounded-2xl shadow-2xl overflow-hidden hidden group-hover:block z-[60]">
            <button onclick="alert('Bucket list feature coming soon!')" class="w-full px-5 py-4 text-left text-sm hover:bg-white/5 flex items-center justify-between">
              <span>My Bucket List</span>
              <span id="saved-count" class="bg-purple-600 text-black px-2 py-0.5 rounded-full text-[10px] font-bold">0</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <header class="relative py-24 px-6 overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-b from-[#1a0a2a] via-[#12121a] to-[#12121a] opacity-80"></div>
      <div class="relative z-10 max-w-6xl mx-auto text-left">
        <h1 class="text-5xl sm:text-7xl font-black mb-6 tracking-tight leading-[0.9] text-[#f5f0e8]">Explore the Strange,<br>the Mysterious,<br>the Unforgettable</h1>
        <p class="text-xl text-zinc-400 mb-10 font-light leading-relaxed max-w-2xl">Discover haunted asylums, cryptid hotspots, and mysteries that defy explanation. Real places, real histories, real hauntings.</p>
        <div class="flex flex-wrap gap-4">
          <button onclick="document.getElementById('grid-section').scrollIntoView({behavior: 'smooth'})" class="bg-purple-600 text-[#12121a] px-8 py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:scale-105 transition">Explore Locations</button>
          <button onclick="alert('Account creation coming soon!')" class="bg-white/5 border border-white/10 text-white px-8 py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-white/10 transition">Start a Bucket List</button>
        </div>
      </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 mb-24">
      <div class="flex items-center gap-3 mb-8 text-left">
        <i data-lucide="skull" class="text-purple-600 w-8 h-8 skull-spin"></i>
        <div class="flex flex-col">
          <span class="text-purple-500 text-[10px] font-black uppercase tracking-[0.3em] mb-0.5">THIS WEEK</span>
          <h2 class="text-2xl font-black text-left">Oddity of the Week</h2>
        </div>
      </div>
      <div id="featured-card" class="bg-[#1e1e28] rounded-[2.5rem] border border-purple-900/30 flex flex-col md:flex-row cursor-pointer transition-all hover:bg-[#252533] overflow-hidden">
        </div>
    </section>

    <section id="grid-section" class="max-w-6xl mx-auto px-6 pb-40">
      <div class="flex flex-col gap-8 mb-12">
        <div class="flex items-center gap-3 text-left">
          <i data-lucide="skull" class="text-purple-600 w-10 h-10 skull-spin"></i>
          <div class="flex flex-col">
            <span class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.3em] mb-0.5">EXPLORE</span>
            <h2 class="text-4xl font-black leading-none text-left">Discover Oddities</h2>
          </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-4 items-center justify-between bg-white/5 p-4 rounded-[2rem] border border-white/5">
          <div class="flex gap-2 overflow-x-auto scroll-container w-full lg:w-auto">
            <button class="filter-btn active bg-purple-600 text-white px-5 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="all"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i> All</button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-5 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="cemetery"><i data-lucide="cross" class="w-3.5 h-3.5"></i> Cemeteries</button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-5 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="historic"><i data-lucide="landmark" class="w-3.5 h-3.5"></i> Historic</button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-5 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="haunted"><i data-lucide="ghost" class="w-3.5 h-3.5"></i> Haunted</button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-5 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="cryptid"><i data-lucide="footprints" class="w-3.5 h-3.5"></i> Cryptid</button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-5 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap" data-filter="alien"><i data-lucide="rocket" class="w-3.5 h-3.5"></i> Aliens/UFO</button>
          </div>
          
          <div class="relative w-full lg:w-64">
            <i data-lucide="search" class="absolute left-4 top-3 w-4 h-4 text-zinc-500"></i>
            <input id="search-input" type="text" placeholder="Search..." class="w-full bg-[#12121a] border border-white/10 rounded-full py-2.5 pl-10 pr-4 focus:outline-none focus:border-purple-500 text-sm text-white">
          </div>
        </div>
      </div>

      <div id="trip-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 text-left">
        </div>
    </section>

    <div id="detail-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
      <div class="w-full max-w-3xl bg-[#1e1e28] rounded-[2.5rem] overflow-hidden border border-white/10 max-h-[90vh] overflow-y-auto shadow-2xl relative text-left">
        <div class="p-8 border-b border-white/5 flex justify-between items-center bg-[#1e1e28] sticky top-0 z-10">
          <h2 id="modal-title" class="text-3xl font-black">Location</h2>
          <button id="modal-close" class="p-3 bg-white/5 rounded-full hover:bg-red-500/20 text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="modal-content" class="p-10"></div>
        <div class="sticky bottom-0 bg-[#1e1e28] p-8 border-t border-white/5 flex gap-4 z-10">
          <button id="modal-save-btn" class="p-4 bg-white/5 rounded-2xl hover:bg-white/10 text-white transition">
            <i data-lucide="bookmark" id="modal-save-icon" class="w-6 h-6"></i>
          </button>
          <a id="modal-map-link" href="#" target="_blank" class="flex-1 bg-purple-600 text-black py-4 rounded-2xl font-bold text-center flex items-center justify-center gap-3">
            <i data-lucide="navigation" class="w-5 h-5 fill-current"></i> Visit
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // DATA
    const trips = [
      { id: 'eureka', title: 'Eureka Springs, Arkansas', region: 'Carroll County, AR', category: 'historic', color: '#8a2be2', desc: 'Built into the Ozark Mountains during the 1880s silver boom. Locals report Victorian figures in the streets.', history: 'Emerged during the 1880s silver boom. The town pivoted to tourism to survive economic collapse.', funFacts: ['Built on steep Ozark hillsides', 'Victorian architecture preserved'] },
      { id: 'waverly', title: 'Waverly Hills Sanatorium', region: 'Louisville, KY', category: 'haunted', color: '#4b0082', desc: 'America\'s most haunted place. The "body chute" was used for discreet corpse removals.', history: 'Opened 1910. Over 60,000 deaths. Noted for extreme activity in Room 502.', funFacts: ['Over 60k deaths', 'Shadow figures reported'] },
      { id: 'san-luis', title: 'San Luis Valley, Colorado', region: 'South-Central CO', category: 'alien', color: '#006400', desc: 'Global UFO hotspot. Indigenous peoples reported "sky beings" for centuries.', history: 'Located on dimensional weak points. UFO activity spiked in the 1950s.', funFacts: ['Ley line intersection', 'Cattle mutilations'] },
      { id: 'villisca', title: 'Villisca Axe Murder House', region: 'Villisca, IA', category: 'cemetery', color: '#310000', desc: '1912 mass murder site. The killer covered all mirrors and windows.', history: 'Eight people killed in their sleep. The perpetrator was never found.', funFacts: ['Mirrors were covered', 'Active paranormal site'] }
    ];

    let likedTrips = new Set();
    let currentFilter = 'all';

function toggleSave(id) {
      // This alert stops the "Save" action and shows your message instead
      alert("To create a Bucket List and save this oddity, please create an account.\n\n(Account creation is coming soon!)");
    }
    
    function renderFeatured() {
      const featured = trips[0];
      const isLiked = likedTrips.has(featured.id);
      document.getElementById('featured-card').innerHTML = `
        <div class="w-full md:w-2/5 min-h-[300px] flex items-center justify-center border-r border-white/5" style="background: linear-gradient(135deg, ${featured.color}, #12121a)">
          <i data-lucide="image" class="w-12 h-12 text-white/10"></i>
        </div>
        <div class="p-10 flex flex-col justify-center flex-1 text-left">
          <span class="text-purple-500 text-[10px] font-black uppercase mb-2 text-left">${featured.region}</span>
          <h3 class="text-3xl font-black mb-4 text-[#f5f0e8] text-left leading-tight">${featured.title}</h3>
          <p class="text-zinc-400 mb-8 line-clamp-2 leading-relaxed text-left">${featured.desc}</p>
          <div class="flex gap-4">
            <button onclick="event.stopPropagation(); toggleSave('${featured.id}')" class="p-4 bg-white/5 rounded-2xl hover:bg-white/10 ${isLiked ? 'liked' : ''} transition-all">
              <i data-lucide="bookmark" class="w-5 h-5"></i>
            </button>
            <button onclick="openModal(trips.find(t=>t.id==='${featured.id}'))" class="px-8 bg-white/5 rounded-2xl text-[10px] font-bold uppercase tracking-widest border border-white/10 text-white">Learn More</button>
          </div>
        </div>
      `;
      lucide.createIcons();
    }

    function renderGrid() {
      const grid = document.getElementById('trip-grid');
      grid.innerHTML = '';
      const filtered = currentFilter === 'all' ? trips : trips.filter(t => t.category === currentFilter);
      filtered.forEach(item => {
        const isLiked = likedTrips.has(item.id);
        const card = document.createElement('div');
        card.className = 'attraction-card rounded-[2.5rem] p-8 cursor-pointer relative';
        card.innerHTML = `
          <div class="h-40 rounded-2xl mb-6 flex items-center justify-center" style="background: linear-gradient(135deg, ${item.color}, #1e1e28)">
            <span class="text-[10px] font-bold text-white/30 uppercase tracking-widest">Photo Coming Soon</span>
          </div>
          <div class="flex justify-between items-start mb-4">
            <div class="text-left">
              <span class="text-purple-500 text-[9px] font-black uppercase tracking-widest text-left">${item.category}</span>
              <h3 class="text-lg font-bold mt-1 text-white text-left leading-tight">${item.title}</h3>
            </div>
            <button onclick="event.stopPropagation(); toggleSave('${item.id}')" class="p-2 bg-white/5 rounded-full ${isLiked ? 'liked' : ''} transition-all">
              <i data-lucide="bookmark" class="w-4 h-4"></i>
            </button>
          </div>
          <p class="text-zinc-500 text-xs line-clamp-2 leading-relaxed text-left">${item.desc}</p>
        `;
        card.onclick = () => openModal(item);
        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    function openModal(item) {
      document.getElementById('modal-title').textContent = item.title;
      document.getElementById('modal-map-link').href = `http://googleusercontent.com/maps.google.com/search?q=${encodeURIComponent(item.title)}`;
      document.getElementById('modal-content').innerHTML = `
        <div class="w-full h-64 rounded-3xl mb-10 flex items-center justify-center" style="background: linear-gradient(135deg, ${item.color}, #1e1e28)">
          <i data-lucide="image" class="w-12 h-12 text-white/10"></i>
        </div>
        <p class="text-zinc-300 text-lg leading-relaxed mb-8">${item.desc}</p>
        <div class="bg-black/30 p-8 rounded-[2rem] border border-white/5 mb-8">
          <h4 class="text-purple-500 font-bold uppercase text-xs mb-4 tracking-widest text-left">History</h4>
          <p class="text-zinc-400 text-sm leading-relaxed text-left">${item.history}</p>
        </div>
        <div>
          <h4 class="text-purple-500 font-bold uppercase text-xs mb-4 tracking-widest text-left">Key Facts</h4>
          <ul class="space-y-3 text-sm text-zinc-400 text-left">
            ${item.funFacts ? item.funFacts.map(f => `<li class="flex gap-3"><i data-lucide="star" class="w-4 h-4 text-purple-600 flex-shrink-0"></i>${f}</li>`).join('') : '<li>Facts coming soon</li>'}
          </ul>
        </div>
      `;
      document.getElementById('detail-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    window.onload = () => {
      renderFeatured();
      renderGrid();
      lucide.createIcons();
      document.getElementById('modal-close').onclick = () => document.getElementById('detail-modal').classList.add('hidden');
      
      document.getElementById('search-input').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = trips.filter(t => t.title.toLowerCase().includes(val) || t.desc.toLowerCase().includes(val));
        const grid = document.getElementById('trip-grid');
        grid.innerHTML = '';
        filtered.forEach(item => {
           const card = document.createElement('div');
           card.className = 'attraction-card rounded-[2.5rem] p-8 cursor-pointer';
           card.innerHTML = `<h3 class="text-white font-bold">${item.title}</h3>`;
           card.onclick = () => openModal(item);
           grid.appendChild(card);
        });
      };

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('bg-purple-600', 'text-white');
            b.classList.add('bg-white/5', 'text-zinc-500');
          });
          btn.classList.add('bg-purple-600', 'text-white');
          currentFilter = btn.dataset.filter;
          renderGrid();
        };
      });
    };
  </script>
</body>
</html>
