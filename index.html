<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddities | Shell Test</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; background: #12121a; color: #f5f0e8; }
    .app-wrapper { font-family: 'Outfit', sans-serif; }
    .oddity-line { width: 24px; height: 2px; background: linear-gradient(to right, #8a2be2 0%, transparent 100%); }
    .attraction-card { transition: all 0.3s ease; border: 1px solid rgba(138,43,226,0.1); }
    .attraction-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); border-color: rgba(138,43,226,0.4); }
    .skull-spin { animation: skullBounce 3s ease-in-out infinite; }
    @keyframes skullBounce { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(5deg); } }
    .scroll-container::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="h-full">
  <div id="app" class="app-wrapper h-full w-full overflow-auto">
    <nav class="sticky top-0 z-50 backdrop-blur-lg border-b border-purple-900/20 bg-[#12121a]/90">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="skull-spin"><i data-lucide="skull" class="text-purple-600"></i></div>
          <span class="text-xl font-bold tracking-tighter">ODDITIES</span>
        </div>
        <div class="flex items-center gap-4 text-sm font-medium">
          <span class="text-zinc-500 hidden sm:inline">Shell v1.0</span>
          <div class="bg-purple-600 text-black px-3 py-1 rounded-full flex items-center gap-2">
            <i data-lucide="bookmark" class="w-3 h-3"></i> <span id="saved-count">0</span>
          </div>
        </div>
      </div>
    </nav>

    <header class="py-20 px-4 text-center bg-gradient-to-b from-[#1a0a2a] to-[#12121a]">
      <h1 class="text-5xl font-black mb-4 tracking-tight">Explore the <span class="text-purple-500">Unexplained.</span></h1>
      <p class="text-zinc-400 max-w-xl mx-auto mb-10">Functional shell test. Use filters and search to navigate the mystery.</p>
      <div class="flex justify-center gap-4">
        <div class="relative w-full max-w-md">
          <i data-lucide="search" class="absolute left-4 top-3 w-4 h-4 text-zinc-500"></i>
          <input id="search-input" type="text" placeholder="Search by name or lore..." class="w-full bg-white/5 border border-white/10 rounded-full py-2.5 pl-11 pr-4 focus:outline-none focus:border-purple-500">
        </div>
      </div>
    </header>

    <section class="max-w-6xl mx-auto px-4 mb-12">
      <div class="flex items-center gap-2 mb-6">
        <div class="oddity-line"></div>
        <h2 class="font-bold text-zinc-400 uppercase text-xs tracking-widest">Weekly Anomaly</h2>
      </div>
      <div id="featured-card" class="bg-[#1e1e28] rounded-2xl p-8 border border-purple-900/30 cursor-pointer hover:bg-[#252533] transition-all">
        </div>
    </section>

    <div class="max-w-6xl mx-auto px-4 mb-8 overflow-x-auto scroll-container flex gap-3">
      <button class="filter-btn active bg-purple-600 text-white px-4 py-1.5 rounded-full text-sm font-bold" data-filter="all">All</button>
      <button class="filter-btn bg-white/5 text-zinc-400 px-4 py-1.5 rounded-full text-sm font-bold" data-filter="haunted">Haunted</button>
      <button class="filter-btn bg-white/5 text-zinc-400 px-4 py-1.5 rounded-full text-sm font-bold" data-filter="historic">Historic</button>
      <button class="filter-btn bg-white/5 text-zinc-400 px-4 py-1.5 rounded-full text-sm font-bold" data-filter="cryptid">Cryptid</button>
    </div>

    <section id="grid-section" class="max-w-6xl mx-auto px-4 pb-20">
      <div id="trip-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </section>

    <div id="detail-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90">
      <div class="w-full max-w-2xl bg-[#1e1e28] rounded-3xl overflow-hidden border border-white/10 max-h-[90vh] overflow-y-auto">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-[#252533]">
          <h2 id="modal-title" class="text-xl font-bold">Location Details</h2>
          <button id="modal-close" class="p-2 bg-white/10 rounded-full hover:bg-red-500/20 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="modal-content" class="p-8"></div>
      </div>
    </div>
  </div>

  <script>
    const trips = [
      { id: 'eureka', title: 'Eureka Springs, Arkansas', category: 'historic', desc: 'Built into the Ozark Mountains during the 1880s silver boom. Known for Victorian architecture and disembodied voices.', history: 'Emerged as a resort town. Mining accidents left emotional scars, leading to reports of Victorian apparitions.', color: '#2a0a20' },
      { id: 'waverly', title: 'Waverly Hills Sanatorium', category: 'haunted', desc: 'Infamous tuberculosis hospital. Home to the "Body Chute" and countless trapped spirits.', history: 'Opened in 1910. Over 60,000 deaths. Room 502 is noted for extreme poltergeist activity.', color: '#2a0a40' },
      { id: 'stanley', title: 'The Stanley Hotel', category: 'haunted', desc: 'The Colorado landmark that inspired Stephen King to write "The Shining".', history: 'Opened in 1909. King stayed in Room 217 (now 401) during an off-season night, conceiving his plot.', color: '#1a2a0a' },
      { id: 'san-luis', title: 'San Luis Valley', category: 'cryptid', desc: 'A remote high-altitude valley famous for UFO sightings and the "Gunnison Creature".', history: 'A center of activity since pre-Columbian times. Sits on major ley line junctions.', color: '#0a2a1a' },
      { id: 'salem', title: 'Salem Gallows Hill', category: 'historic', desc: 'Site of the 1692 Witch Trial executions. A place of deep historical trauma.', history: 'Nineteen were hanged here. The hysteria lasted 14 months but changed American law forever.', color: '#2a0a30' },
      { id: 'winchester', title: 'Winchester Mystery House', category: 'cryptid', desc: 'A mansion with stairways to nowhere, built to confuse the spirits of rifle victims.', history: 'Sarah Winchester built continuously for 38 years to appease those killed by her husband\'s rifles.', color: '#2a1a0a' },
      { id: 'trans-allegheny', title: 'Trans-Allegheny Asylum', category: 'haunted', desc: 'Overcrowded lunatic asylum where barbaric treatments were standard practice.', history: 'Designed for 250, it held 1,900. Screams are still reported echoing from empty wards.', color: '#0a1a2a' },
      { id: 'bobby-mackey', title: 'Bobby Mackey\'s Music World', category: 'haunted', desc: 'A honky-tonk bar built on a former slaughterhouse with a very dark, violent past.', history: 'Site of a gruesome 1896 murder. Bottle-throwing and physical pushes are frequently reported.', color: '#2a0a0a' },
      { id: 'myrtles', title: 'Myrtles Plantation', category: 'haunted', desc: 'One of America\'s most haunted homes, allegedly housing exactly ten distinct ghosts.', history: 'Built in 1796. Legend says a slave named Chloe poisoned the family in a tragic cycle of revenge.', color: '#1a2a1a' },
      { id: 'villisca', title: 'Villisca Axe Murder House', category: 'historic', desc: 'Site of an unsolved 1912 mass murder where an entire family was killed in their sleep.', history: 'Eight victims total. The killer covered all mirrors and windows, a detail that still baffles police.', color: '#1a0a0a' }
    ];

    function renderFeatured() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 1);
      const weekNum = Math.floor((now - start) / 86400000 / 7);
      const featured = trips[weekNum % trips.length];
      const card = document.getElementById('featured-card');
      card.innerHTML = `
        <span class="text-purple-500 font-bold text-xs uppercase tracking-widest">${featured.category}</span>
        <h3 class="text-3xl font-bold mt-2 mb-4">${featured.title}</h3>
        <p class="text-zinc-400 leading-relaxed max-w-2xl">${featured.desc}</p>
        <div class="mt-6 flex items-center gap-2 text-purple-400 text-sm font-bold">
          View Full Lore <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </div>
      `;
      card.onclick = () => openModal(featured);
      lucide.createIcons();
    }

    function renderGrid(data = trips) {
      const grid = document.getElementById('trip-grid');
      grid.innerHTML = '';
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'attraction-card bg-[#1e1e28] rounded-2xl p-6 cursor-pointer';
        div.innerHTML = `
          <div class="h-2 w-12 rounded-full mb-4" style="background:${item.color}"></div>
          <span class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">${item.category}</span>
          <h3 class="text-lg font-bold mt-1 text-white">${item.title}</h3>
          <p class="text-zinc-500 text-xs mt-3 line-clamp-2">${item.desc}</p>
        `;
        div.onclick = () => openModal(item);
        grid.appendChild(div);
      });
    }

    function openModal(item) {
      document.getElementById('modal-title').textContent = item.title;
      document.getElementById('modal-content').innerHTML = `
        <div class="w-full h-4 rounded-xl mb-6" style="background:${item.color}"></div>
        <p class="text-zinc-300 text-lg mb-8 leading-relaxed">${item.desc}</p>
        <div class="bg-black/20 p-6 rounded-2xl border border-white/5">
          <h4 class="text-purple-500 font-bold text-sm uppercase mb-3 tracking-widest">History & Lore</h4>
          <p class="text-zinc-400 leading-relaxed text-sm">${item.history}</p>
        </div>
      `;
      document.getElementById('detail-modal').classList.remove('hidden');
    }

    // Controls
    window.onload = () => {
      renderFeatured();
      renderGrid();
      lucide.createIcons();

      document.getElementById('modal-close').onclick = () => document.getElementById('detail-modal').classList.add('hidden');
      
      document.getElementById('search-input').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = trips.filter(t => t.title.toLowerCase().includes(val) || t.desc.toLowerCase().includes(val));
        renderGrid(filtered);
      };

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-purple-600', 'text-white'));
          btn.classList.add('bg-purple-600', 'text-white');
          const f = btn.dataset.filter;
          renderGrid(f === 'all' ? trips : trips.filter(t => t.category === f));
        }
      });
    };
  </script>
</body>
</html>
