<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddities | The Odd Phoenix</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; background: #12121a; color: #f5f0e8; scroll-behavior: smooth; }
    .app-wrapper { font-family: 'Outfit', sans-serif; }
    .attraction-card { transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1); border: 1px solid rgba(138,43,226,0.08); background: #1e1e28; }
    .attraction-card:hover { transform: translateY(-8px); border-color: rgba(138,43,226,0.4); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
    .skull-spin { animation: skullBounce 3s ease-in-out infinite; }
    @keyframes skullBounce { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(5deg); } }
    .scroll-container::-webkit-scrollbar { display: none; }
    .filter-btn.active { background-color: #9333ea !important; color: white !important; border-color: transparent !important; }
    #toast { visibility: hidden; min-width: 280px; background-color: #8a2be2; color: #fff; text-align: center; border-radius: 16px; padding: 20px; position: fixed; z-index: 1000; right: 30px; bottom: 30px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); }
    #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
    @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
  </style>
</head>
<body class="h-full">
  <div id="toast">Coming Soon</div>

  <div id="app" class="app-wrapper h-full w-full overflow-auto">
    <nav class="border-b border-purple-900/20 bg-[#12121a]">
      <div class="max-w-6xl mx-auto px-6 py-8 flex items-center justify-between">
        <div class="flex items-center gap-3 text-left">
          <div class="skull-spin"><i data-lucide="skull" class="text-purple-600 w-8 h-8"></i></div>
          <span class="text-2xl font-black tracking-tighter uppercase">OddStops</span>
        </div>
        <button onclick="showToast('Account creation coming soon')" class="flex items-center gap-2 px-6 py-3 rounded-full text-xs font-bold bg-[#8a2be2] text-[#12121a] uppercase tracking-wider transition hover:scale-105">
          <i data-lucide="user" class="w-4 h-4"></i> <span>My Account</span>
        </button>
      </div>
    </nav>

    <header class="relative pt-24 pb-12 px-6 overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-b from-[#1a0a2a] via-[#12121a] to-[#12121a] opacity-80"></div>
      <div class="relative z-10 max-w-6xl mx-auto text-left">
        <h1 class="text-5xl sm:text-7xl font-black mb-6 tracking-tight leading-[0.9] text-[#f5f0e8]">Explore the Strange,<br>the Mysterious,<br>the Unforgettable</h1>
        <p class="text-xl text-zinc-400 mb-10 font-normal leading-relaxed max-w-2xl">Uncover forgotten histories, cryptid hotspots, and urban legends that defy explanation. Real records. Real mysteries.</p>
        <div class="flex flex-wrap gap-4">
          <button onclick="document.getElementById('grid-section').scrollIntoView({behavior: 'smooth'})" class="bg-purple-600 text-[#12121a] px-8 py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:scale-105 transition">Explore Locations</button>
          <button onclick="showToast('Bucket list coming soon')" class="bg-white/5 border border-white/10 text-white px-8 py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-white/10 transition">Start a Bucket List</button>
        </div>
      </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 mt-20 mb-20">
      <div class="flex items-center gap-3 mb-8 text-left">
        <i data-lucide="skull" class="text-purple-600 w-10 h-10 skull-spin"></i>
        <div class="flex flex-col">
          <span class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.3em] mb-0.5">THIS WEEK</span>
          <h2 class="text-4xl font-black leading-none text-left tracking-tighter">Featured Stop</h2>
        </div>
      </div>
      <div id="featured-card" class="bg-[#1e1e28] rounded-[2.5rem] border border-purple-900/30 overflow-hidden cursor-pointer transition-all hover:bg-[#23232e]">
      </div>
    </section>

    <section id="grid-section" class="max-w-6xl mx-auto px-6 pb-20 mt-20">
      <div class="flex flex-col gap-8 mb-12">
        <div class="flex items-center gap-3 text-left">
          <i data-lucide="skull" class="text-purple-600 w-10 h-10 skull-spin"></i>
          <div class="flex flex-col">
            <span class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.3em] mb-0.5">EXPLORE</span>
            <h2 class="text-4xl font-black leading-none text-left tracking-tighter">Discover Odd Stops</h2>
          </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-4 items-center justify-between bg-white/5 p-4 rounded-[2.5rem] border border-white/5">
          <div class="flex gap-2 overflow-x-auto scroll-container w-full lg:w-auto p-1">
            <button class="filter-btn active bg-purple-600 text-white px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap transition" data-filter="all">
              <i data-lucide="sparkles" class="w-4 h-4"></i> All
            </button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap transition hover:text-white" data-filter="cemetery">
              <i data-lucide="cross" class="w-4 h-4"></i> Cemeteries
            </button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap transition hover:text-white" data-filter="historic">
              <i data-lucide="landmark" class="w-4 h-4"></i> Historic
            </button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap transition hover:text-white" data-filter="haunted">
              <i data-lucide="ghost" class="w-4 h-4"></i> Haunted
            </button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap transition hover:text-white" data-filter="cryptid">
              <i data-lucide="footprints" class="w-4 h-4"></i> Cryptid
            </button>
            <button class="filter-btn bg-white/5 text-zinc-500 px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap transition hover:text-white" data-filter="alien">
              <i data-lucide="rocket" class="w-4 h-4"></i> Aliens/UFO
            </button>
          </div>
          
          <div class="flex gap-3 w-full lg:w-auto">
            <select id="state-filter" class="bg-[#12121a] border border-white/10 rounded-full py-3 px-6 text-[10px] font-bold text-white uppercase tracking-widest focus:outline-none focus:border-purple-500 cursor-pointer appearance-none">
                <option value="all">All States</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="IA">Iowa</option>
                <option value="IL">Illinois</option>
                <option value="KY">Kentucky</option>
                <option value="PA">Pennsylvania</option>
                <option value="WV">West Virginia</option>
            </select>
            <div class="relative flex-1 lg:w-64">
              <i data-lucide="search" class="absolute left-4 top-3.5 w-4 h-4 text-zinc-500"></i>
              <input id="search-input" type="text" placeholder="Search..." class="w-full bg-[#12121a] border border-white/10 rounded-full py-3 pl-10 pr-4 focus:outline-none focus:border-purple-500 text-sm text-white">
            </div>
          </div>
        </div>
      </div>

      <div id="trip-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 text-left"></div>
    </section>

    <div id="detail-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
      <div class="w-full max-w-3xl bg-[#1e1e28] rounded-[2.5rem] overflow-hidden border border-white/10 max-h-[90vh] overflow-y-auto shadow-2xl relative text-left">
        <div class="p-8 border-b border-white/5 flex justify-between items-center bg-[#1e1e28] sticky top-0 z-10">
          <h2 id="modal-title" class="text-3xl font-black">Location</h2>
          <button id="modal-close" class="p-3 bg-white/5 rounded-full hover:bg-red-500/20 text-white transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        
        <div id="modal-content" class="p-10 space-y-10">
          </div>

        <div class="sticky bottom-0 bg-[#1e1e28] p-8 border-t border-white/5 flex gap-4 z-10">
          <button onclick="showToast('Coming Soon')" class="p-4 bg-white/5 rounded-2xl border border-white/5 text-white hover:bg-white/10 transition group">
             <i data-lucide="bookmark" class="w-6 h-6"></i>
          </button>
          <a id="modal-map-link" href="#" target="_blank" class="flex-1 bg-purple-600 text-black py-4 rounded-2xl font-bold text-center flex items-center justify-center gap-3">
            <i data-lucide="navigation" class="w-5 h-5 fill-current"></i> Visit Location
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const trips = [
      { 
        id: 'eureka', title: 'Eureka Springs', state: 'AR', region: 'Carroll County, AR', category: 'historic', color: '#8a2be2', 
        desc: 'A Victorian-era town built on healing springs and deep lore.',
        history: 'Founded in 1879, Eureka Springs was built around 60 natural cold-water springs believed by indigenous peoples and early settlers to have miraculous healing powers. The entire city is listed on the National Register of Historic Places, featuring a labyrinth of winding, steep streets where no two roads intersect at a 90-degree angle.',
        facts: ['The entire downtown is built into steep Ozark limestone bluffs', 'Underground tunnels and "hidden" levels exist beneath the streets', 'Home to the massive "Christ of the Ozarks" statue', 'Known for its "Palace Hotel" and bathhouse culture'],
        related: ['falk', 'crescent'] 
      },
      { 
        id: 'waverly', title: 'Waverly Hills Sanatorium', state: 'KY', region: 'Louisville, KY', category: 'haunted', color: '#4b0082', 
        desc: 'A Tudor Gothic monument to a dark era of American medicine.',
        history: 'Opened in 1910 to combat a massive Tuberculosis outbreak, Waverly Hills became a self-contained city. After antibiotics made the facility obsolete in 1961, it fell into decay, gaining a reputation as one of the most haunted locations in the world.',
        facts: ['The "Body Chute" is a 500-foot tunnel used to remove the deceased', 'Room 502 is the epicenter of reported paranormal activity', 'Over 60,000 deaths occurred within these walls'],
        related: [] 
      },
      { id: 'san-luis', title: 'San Luis Valley', state: 'CO', region: 'South-Central CO', category: 'alien', color: '#006400', desc: 'North America\'s most active UFO and paranormal hotspot.', history: 'A high-altitude desert valley that has been a center of strange phenomena for centuries.', facts: ['Consistent sightings of craft', 'High concentrations of vortices'], related: ['ufo-watchtower'] },
      { id: 'villisca', title: 'Axe Murder House', state: 'IA', region: 'Villisca, IA', category: 'cemetery', color: '#310000', desc: 'Site of a brutal 1912 unsolved mystery.', history: 'An entire family and two guests were bludgeoned to death in 1912. The house remains in its original condition.', facts: ['Axes found at scene', 'No electricity or running water'], related: [] },
      { id: 'mothman', title: 'Mothman Site', state: 'WV', region: 'Point Pleasant, WV', category: 'cryptid', color: '#1a1a1a', desc: 'Epicenter of a 13-month reign of terror.', history: 'Dozens of residents reported a winged creature with red eyes between 1966 and 1967.', facts: ['TNT Area sightings', '12-foot chrome statue'], related: [] },
      { id: 'mutter', title: 'Mütter Museum', state: 'PH', region: 'Philadelphia, PA', category: 'historic', color: '#5c4033', desc: 'Collection of anatomical specimens and medical oddities.', history: 'Started in 1858 by Dr. Thomas Dent Mütter to improve medical education.', facts: ['Albert Einstein’s brain pieces', '139 human skulls'], related: [] },
      { id: 'bachelors', title: 'Bachelor\'s Grove', state: 'IL', region: 'Midlothian, IL', category: 'cemetery', color: '#2d3b2d', desc: 'Widely considered the most haunted graveyard in America.', history: 'Abandoned cemetery dating back to the 1840s.', facts: ['Famous Madonna photo', 'Phantom farmhouses'], related: [] },
      { id: 'falk', title: 'Fouke Monster Bog', state: 'AR', region: 'Fouke, AR', category: 'cryptid', color: '#1b3022', desc: 'Home to the aggressive, three-toed Southern Sasquatch.', history: 'Inspired the 1972 film The Legend of Boggy Creek.', facts: ['Three-toed footprints found', 'Boggy Creek sightings'], related: ['eureka'] },
      { id: 'centralia', title: 'Centralia Mine Fire', state: 'PA', region: 'Centralia, PA', category: 'historic', color: '#444444', desc: 'A town burning from the inside out.', history: 'An underground coal fire has been burning beneath the town since 1962.', facts: ['Ground heat over 1,000F', 'Zip code revoked in 2002'], related: [] },
      { id: 'winchester', title: 'Winchester House', state: 'CA', region: 'San Jose, CA', category: 'historic', color: '#3d2b1f', desc: 'Architectural madness built to confuse spirits.', history: 'Sarah Winchester kept construction going for 38 years to appease ghosts.', facts: ['Stairs to the ceiling', '160 rooms'], related: [] },
      { id: 'crescent', title: 'Crescent Hotel', state: 'AR', region: 'Eureka Springs, AR', category: 'haunted', color: '#2e1a47', desc: 'Known as "America\'s Most Haunted Hotel."', history: 'Once a fraudulent cancer hospital run by Norman Baker.', facts: ['Basement morgue', 'Ghost of Michael'], related: ['eureka'] },
      { id: 'ufo-watchtower', title: 'UFO Watchtower', state: 'CO', region: 'Hooper, CO', category: 'alien', color: '#004d40', desc: 'Roadside observation deck in the high-altitude desert.', history: 'Built to provide a place for enthusiasts to scan the skies.', facts: ['Rock Garden offerings', 'Two psychic vortices'], related: ['san-luis'] }
    ];

    let currentCat = 'all';
    let currentState = 'all';

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.className = "show";
      setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function openModal(id) {
      const item = trips.find(t => t.id === id);
      if(!item) return;

      document.getElementById('modal-title').textContent = item.title;
      document.getElementById('modal-map-link').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.title + ' ' + item.region)}`;
      
      let relatedHtml = '';
      if (item.related && item.related.length > 0) {
        relatedHtml = `
          <div>
            <h4 class="text-purple-500 font-bold uppercase text-xs mb-6 tracking-widest">Related</h4>
            <div class="grid grid-cols-1 gap-3">
              ${item.related.map(relId => {
                const rel = trips.find(t => t.id === relId);
                if (!rel) return '';
                return `
                  <button onclick="openModal('${rel.id}')" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl text-left hover:bg-white/10 transition flex justify-between items-center">
                    <div>
                      <p class="text-white font-bold">${rel.title}</p>
                      <p class="text-[10px] text-zinc-500 uppercase tracking-widest">${rel.region}</p>
                    </div>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-purple-500"></i>
                  </button>`;
              }).join('')}
            </div>
          </div>`;
      }

      document.getElementById('modal-content').innerHTML = `
        <div class="w-full h-72 rounded-[2rem] flex items-center justify-center shadow-inner" style="background: linear-gradient(135deg, ${item.color}, #1e1e28)">
          <span class="text-[10px] font-bold text-white/20 uppercase tracking-widest">Photo Coming Soon</span>
        </div>
        <div>
          <div class="flex items-center gap-2 mb-4 text-purple-500">
              <i data-lucide="map-pin" class="w-4 h-4"></i>
              <span class="text-xs font-bold uppercase tracking-widest">${item.region}</span>
          </div>
          <p class="text-zinc-300 text-lg leading-relaxed border-l-2 border-purple-600/30 pl-6">${item.desc}</p>
        </div>
        <div>
          <h3 class="text-purple-500 font-bold text-2xl mb-4 uppercase tracking-tighter">History & Lore</h3>
          <p class="text-zinc-400 leading-relaxed text-md">${item.history || 'Information pending.'}</p>
        </div>
        <div>
          <h3 class="text-purple-500 font-bold text-2xl mb-6 uppercase tracking-tighter">Key Facts</h3>
          <ul class="space-y-4">
            ${item.facts ? item.facts.map(fact => `
              <li class="flex items-start gap-3 text-zinc-300">
                <i data-lucide="star" class="w-5 h-5 text-purple-500 mt-1 shrink-0"></i>
                <span class="text-md font-medium leading-tight">${fact}</span>
              </li>
            `).join('') : ''}
          </ul>
        </div>
        ${relatedHtml}
      `;
      
      document.getElementById('detail-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    function renderFeatured() {
      const featured = trips[0];
      document.getElementById('featured-card').innerHTML = `
        <div onclick="openModal('${featured.id}')" class="flex flex-col md:flex-row w-full group">
          <div class="w-full md:w-2/5 min-h-[350px] flex items-center justify-center border-r border-white/5" style="background: linear-gradient(135deg, ${featured.color}, #12121a)">
            <span class="text-[10px] font-bold text-white/20 uppercase tracking-widest">Photo Coming Soon</span>
          </div>
          <div class="p-12 flex flex-col justify-center flex-1 text-left relative">
            <h3 class="text-4xl font-black mb-2 text-[#f5f0e8] leading-tight group-hover:text-purple-400 transition-colors uppercase">${featured.title}</h3>
            <div class="flex items-center gap-2 mb-6 text-purple-500">
               <i data-lucide="map-pin" class="w-4 h-4"></i>
               <span class="text-sm font-bold uppercase tracking-wider">${featured.region}</span>
            </div>
            <p class="text-zinc-400 text-lg mb-10 leading-relaxed">${featured.desc}</p>
            <div class="flex items-center justify-between border-t border-white/5 pt-8">
              <span class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500">Tap to learn more</span>
              <div class="p-4 bg-white/5 rounded-2xl border border-white/5"><i data-lucide="arrow-up-right" class="w-5 h-5"></i></div>
            </div>
          </div>
        </div>
      `;
      lucide.createIcons();
    }

    function renderGrid() {
      const grid = document.getElementById('trip-grid');
      grid.innerHTML = '';
      const filtered = trips.filter(t => 
        (currentCat === 'all' || t.category === currentCat) && 
        (currentState === 'all' || t.state === currentState)
      );

      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'attraction-card rounded-[2.5rem] p-8 cursor-pointer relative';
        card.innerHTML = `
          <div class="h-48 rounded-2xl mb-6 flex items-center justify-center" style="background: linear-gradient(135deg, ${item.color}, #1e1e28)">
            <span class="text-[10px] font-bold text-white/30 uppercase tracking-widest">Photo Coming Soon</span>
          </div>
          <div class="text-left">
            <h3 class="text-2xl font-black text-white leading-tight uppercase">${item.title}</h3>
            <div class="flex items-center gap-1.5 mt-2 mb-4 text-purple-500">
               <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
               <span class="text-[11px] font-bold uppercase tracking-widest">${item.region}</span>
            </div>
            <p class="text-zinc-500 text-sm line-clamp-2 leading-relaxed">${item.desc}</p>
          </div>
        `;
        card.onclick = () => openModal(item.id);
        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    window.onload = () => {
      renderFeatured();
      renderGrid();
      lucide.createIcons();
      document.getElementById('modal-close').onclick = () => document.getElementById('detail-modal').classList.add('hidden');
      
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active', 'bg-purple-600', 'text-white');
            b.classList.add('bg-white/5', 'text-zinc-500');
          });
          btn.classList.add('active', 'bg-purple-600', 'text-white');
          btn.classList.remove('bg-white/5', 'text-zinc-500');
          currentCat = btn.dataset.filter;
          renderGrid();
        };
      });

      document.getElementById('state-filter').onchange = (e) => {
        currentState = e.target.value;
        renderGrid();
      };

      document.getElementById('search-input').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const grid = document.getElementById('trip-grid');
        grid.innerHTML = '';
        const filtered = trips.filter(t => t.title.toLowerCase().includes(val) || t.region.toLowerCase().includes(val));
        filtered.forEach(item => {
           const card = document.createElement('div');
           card.className = 'attraction-card rounded-[2.5rem] p-8 cursor-pointer relative';
           card.innerHTML = `
             <div class="h-48 rounded-2xl mb-6 flex items-center justify-center" style="background: linear-gradient(135deg, ${item.color}, #1e1e28)">
                <span class="text-[10px] font-bold text-white/30 uppercase tracking-widest">Photo Coming Soon</span>
             </div>
             <h3 class="text-2xl font-black text-white leading-tight uppercase">${item.title}</h3>
             <div class="flex items-center gap-1.5 mt-2 mb-4 text-purple-500">
                <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                <span class="text-[11px] font-bold uppercase tracking-widest uppercase">${item.region}</span>
             </div>
           `;
           card.onclick = () => openModal(item.id);
           grid.appendChild(card);
        });
        lucide.createIcons();
      };
    };
  </script>
</body>
</html>
```
